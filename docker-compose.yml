services:
  vpn:
    image: tobyxdd/hysteria
    container_name: hysteria_vpn
    restart: always
    volumes:
      - ./config.yaml:/etc/hysteria/config.yaml:ro
    command: ["client", "-c", "/etc/hysteria/config.yaml"]
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  autorpg:
    build: .
    container_name: tg_autorpg
    restart: unless-stopped
    network_mode: "service:vpn"
    depends_on:
      vpn:
        condition: service_healthy

    environment:
      # Токен бота от @BotFather (обязательно)
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN:-placeholder}
      # Прокси через VPN контейнер
      - HTTP_PROXY=http://127.0.0.1:8080
      - HTTPS_PROXY=http://127.0.0.1:8080
      - ALL_PROXY=socks5://127.0.0.1:1080
      - http_proxy=http://127.0.0.1:8080
      - https_proxy=http://127.0.0.1:8080
      # SOCKS5 прокси (опционально, формат: socks5://user:pass@host:port)
      - TELEGRAM_PROXY=${TELEGRAM_PROXY:-}
      # Тип БД (sqlite+aiosqlite, mysql+aiomysql, postgresql+asyncpg)
      - DBTYPE=${DBTYPE:-sqlite+aiosqlite}
      # Путь к файлу БД внутри контейнера
      - DB_PATH=/data/autorpg.db
      # Настройки игры
      - OFFLINE_TIMEOUT=${OFFLINE_TIMEOUT:-3600}
      - GAME_INTERVAL=${GAME_INTERVAL:-5}
      - MONSTER_INTERVAL=${MONSTER_INTERVAL:-1800}
      # Healthcheck порт
      - HEALTH_PORT=${HEALTH_PORT:-8081}

    # Healthcheck — проверяет HTTP эндпоинт
    healthcheck:
      test: ["CMD", "python3", "-c", "import aiohttp; import asyncio; asyncio.run(aiohttp.ClientSession().get('http://localhost:8081/health'))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    volumes:
      # База данных
      - ./data:/data

    # Логи — последние 10 МБ, не более 3 файлов
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"